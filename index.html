<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>KTX 산천 기관사 게임</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game">
    <h1>🚄 KTX 산천 기관사 게임</h1>

    <div class="top-info">
      <div>🚄 속도 <span id="speed">0</span> km/h</div>
      <div>😊 만족도 <span id="happy">100</span>%</div>
      <div>⭐ 점수 <span id="score">0</span></div>
      <div>🔧 고장 <span id="failureCount">0</span>건</div>
    </div>

    <div class="map">
      <svg class="world" viewBox="0 0 900 430">
        <rect width="900" height="430" rx="24" fill="#82cf67"/>

        <circle cx="90" cy="70" r="28" fill="#4fae4f"/>
        <circle cx="760" cy="70" r="34" fill="#4fae4f"/>
        <circle cx="120" cy="350" r="34" fill="#4fae4f"/>
        <circle cx="770" cy="340" r="38" fill="#4fae4f"/>

        <ellipse cx="450" cy="220" rx="340" ry="150" fill="none" stroke="#6b4325" stroke-width="34"/>
        <ellipse cx="450" cy="220" rx="340" ry="150" fill="none" stroke="#d9c7a2" stroke-width="22"/>
        <ellipse cx="450" cy="220" rx="340" ry="150" fill="none" stroke="#777" stroke-width="6"/>
        <ellipse cx="450" cy="220" rx="300" ry="118" fill="none" stroke="#777" stroke-width="6"/>

        <g stroke="#8b5a2b" stroke-width="5">
          <line x1="450" y1="45" x2="450" y2="88"/>
          <line x1="590" y1="65" x2="570" y2="105"/>
          <line x1="710" y1="120" x2="670" y2="145"/>
          <line x1="775" y1="220" x2="725" y2="220"/>
          <line x1="710" y1="320" x2="670" y2="295"/>
          <line x1="590" y1="375" x2="570" y2="335"/>
          <line x1="450" y1="395" x2="450" y2="352"/>
          <line x1="310" y1="375" x2="330" y2="335"/>
          <line x1="190" y1="320" x2="230" y2="295"/>
          <line x1="125" y1="220" x2="175" y2="220"/>
          <line x1="190" y1="120" x2="230" y2="145"/>
          <line x1="310" y1="65" x2="330" y2="105"/>
        </g>

        <g>
          <rect x="355" y="145" width="190" height="120" rx="10" fill="#fff5cf" stroke="#174a9c" stroke-width="5"/>
          <polygon points="340,145 450,85 560,145" fill="#2f80ed" stroke="#174a9c" stroke-width="5"/>
          <rect x="415" y="205" width="70" height="60" fill="#7ec8ff" stroke="#174a9c" stroke-width="4"/>
          <text x="450" y="185" text-anchor="middle" font-size="28" font-weight="bold" fill="#174a9c">서울역</text>
        </g>

        <g font-size="18" font-weight="bold" text-anchor="middle">
          <rect x="65" y="190" width="95" height="58" rx="10" fill="#fff8df" stroke="#174a9c" stroke-width="4"/>
          <text x="112" y="225" fill="#174a9c">대전역</text>

          <rect x="740" y="190" width="95" height="58" rx="10" fill="#fff8df" stroke="#174a9c" stroke-width="4"/>
          <text x="787" y="225" fill="#174a9c">부산역</text>

          <rect x="400" y="355" width="100" height="58" rx="10" fill="#fff8df" stroke="#174a9c" stroke-width="4"/>
          <text x="450" y="390" fill="#174a9c">동대구역</text>
        </g>

        <g id="trainSvg">
          <g id="ktxShape">
            <path d="M -65 -18 L 35 -18 Q 70 -18 78 0 Q 70 18 35 18 L -65 18 Q -85 18 -92 0 Q -85 -18 -65 -18 Z"
              fill="white" stroke="#174a9c" stroke-width="4"/>
            <path d="M -70 -12 L 25 -12 Q 55 -12 67 0 Q 55 12 25 12 L -70 12 Z"
              fill="#eaf6ff"/>
            <rect x="-45" y="-15" width="65" height="8" rx="4" fill="#1f70d1"/>
            <rect x="-42" y="5" width="20" height="7" rx="3" fill="#444"/>
            <rect x="-15" y="5" width="20" height="7" rx="3" fill="#444"/>
            <rect x="12" y="5" width="20" height="7" rx="3" fill="#444"/>
            <text x="-35" y="4" font-size="16" font-weight="bold" fill="#174a9c">KTX</text>
          </g>

          <!-- 고장 시각 효과 -->
          <g id="failureEffect" class="effect hidden">
            <text id="effectIcon1" x="0" y="-45" font-size="34" text-anchor="middle">⚡</text>
            <text id="effectIcon2" x="25" y="-28" font-size="28" text-anchor="middle">💥</text>
            <text id="effectIcon3" x="-25" y="-25" font-size="26" text-anchor="middle">💨</text>
          </g>
        </g>
      </svg>
    </div>

    <div class="message-box">
      <div id="failureIcon">✅</div>
      <div id="message">대기 중입니다.</div>
    </div>

    <div class="complaint-box">
      <div>🗣️ 손님 컴플레인</div>
      <div id="complaint">아직 컴플레인이 없습니다.</div>
    </div>

    <div class="controls">
      <button onclick="startTrain()">▶️ 출발</button>
      <button onclick="stopTrain()">⏹️ 정지</button>
      <button onclick="emergencyBrake()">🚨 비상제동</button>
    </div>

    <h3>정비팀 호출</h3>

    <div class="mechanics">
      <button onclick="callMechanic('electric')">⚡<br>전기팀</button>
      <button onclick="callMechanic('wheel')">🛞<br>바퀴팀</button>
      <button onclick="callMechanic('engine')">🛠️<br>엔진팀</button>
      <button onclick="callMechanic('brake')">🧯<br>브레이크팀</button>
      <button onclick="callMechanic('signal')">🚦<br>신호팀</button>
      <button onclick="callMechanic('aircon')">❄️<br>냉난방팀</button>
      <button onclick="callMechanic('door')">🚪<br>출입문팀</button>
    </div>

    <button class="reset" onclick="resetGame()">🔄 다시 시작</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
